<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Waste Manager — SCU Campus</title>
  <link rel="stylesheet" href="css/base.css"/>
  <link rel="stylesheet" href="css/sidebar.css"/>
  <link rel="stylesheet" href="css/overview.css"/>
  <link rel="stylesheet" href="css/map.css"/>
  <link rel="stylesheet" href="css/trends.css"/>
</head>
<body>

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">🗑️</div>
      <div class="brand-text">
        <h1>Waste Manager</h1>
        <p>Campus System · SCU</p>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-item active" data-page="overview">
        <span class="icon">📊</span> Live Overview
      </div>
      <div class="nav-item" data-page="map">
        <span class="icon">🗺️</span> Map View
      </div>
      <div class="nav-item" data-page="trends">
        <span class="icon">📈</span> Trends
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="avatar">CS</div>
      <div class="user-info">
        <h4>Custodial Staff</h4>
        <p>On Duty</p>
      </div>
    </div>
  </aside>

  <!-- ── MAIN ── -->
  <main class="main">
    <section class="page active" id="page-overview"></section>
    <section class="page"        id="page-map"></section>
    <section class="page"        id="page-trends"></section>
  </main>

  <!-- Dependencies -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

  <!-- App (load order matters) -->
  <script src="js/data.js"></script>
  <script src="js/overview.js"></script>
  <script src="js/map.js"></script>
  <script src="js/trends.js"></script>
  <script src="js/nav.js"></script>

</body>
</html>
